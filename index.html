<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        :root {
            --text-color: #ffffff;
            --card-bg: rgba(18, 28, 40, 0.5);
            --card-border: rgba(255, 255, 255, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.25);
            --button-hover: rgba(255, 255, 255, 0.2);
            --divider: rgba(255, 255, 255, 0.35);
        }

        body.light-mode {
            --text-color: #1f2a36;
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-border: rgba(255, 255, 255, 0.85);
            --shadow-color: rgba(12, 22, 36, 0.18);
            --button-hover: rgba(255, 255, 255, 0.92);
            --divider: rgba(31, 42, 54, 0.24);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-color);
        }

        #vanta-waves {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #widgets-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #theme-toggle-btn {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 8px 14px;
            color: var(--text-color);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: background 0.2s;
            align-self: flex-end;
        }

        #theme-toggle-btn:hover {
            background: var(--button-hover);
        }

        #time-widget {
            width: 100%;
            min-width: 260px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 14px 20px;
            color: var(--text-color);
            box-shadow: 0 4px 24px var(--shadow-color);
            text-align: center;
        }

        #time-widget .greeting {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        #time-widget .clock {
            font-size: 38px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.5px;
        }

        #time-widget .date {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 6px;
        }

        #vanta-presets {
            width: 100%;
            min-width: 260px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 4px 24px var(--shadow-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #vanta-presets .preset-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        #vanta-presets .preset-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.75;
        }

        #preset-toggle-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-color);
            padding: 6px 10px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        #preset-toggle-btn:hover {
            background: var(--button-hover);
        }

        #vanta-presets .preset-buttons {
            display: none;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        #vanta-presets.expanded .preset-buttons {
            display: grid;
        }

        @media (max-width: 700px) {
            #vanta-presets .preset-buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .vanta-preset-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-color);
            padding: 8px 10px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .vanta-preset-btn:hover {
            background: var(--button-hover);
            transform: translateY(-1px);
        }

        .vanta-preset-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        #weather-widget {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 16px 28px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 260px;
            box-shadow: 0 4px 24px var(--shadow-color);
            font-size: 15px;
        }

        #weather-widget .weather-icon {
            font-size: 42px;
            line-height: 1;
        }

        #weather-widget .weather-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #weather-widget .weather-temp {
            font-size: 32px;
            font-weight: 600;
            line-height: 1;
        }

        #weather-widget .weather-desc {
            font-size: 13px;
            text-transform: capitalize;
            opacity: 0.9;
        }

        #weather-widget .weather-location {
            font-size: 12px;
            opacity: 0.75;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #weather-widget .weather-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            opacity: 0.85;
            padding-left: 12px;
            border-left: 1px solid var(--divider);
        }

        #weather-widget .weather-loading {
            font-size: 14px;
            opacity: 0.85;
        }

        #weather-widget .weather-error {
            font-size: 13px;
            opacity: 0.85;
        }

        #windy-toggle-btn {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 8px 18px;
            color: var(--text-color);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: background 0.2s;
            align-self: flex-end;
        }

        #windy-toggle-btn:hover {
            background: var(--button-hover);
        }

        #windy-widget {
            width: 650px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 24px var(--shadow-color);
            display: none;
        }

        #windy-widget iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="vanta-waves"></div>

    <!-- Widgets Container -->
    <div id="widgets-container">
        <button id="theme-toggle-btn" onclick="toggleTheme()">🌙 Dark Mode</button>
        <div id="vanta-presets">
            <div class="preset-header">
                <div class="preset-title">Background Presets</div>
                <button id="preset-toggle-btn" onclick="togglePresetPanel()">Show</button>
            </div>
            <div class="preset-buttons" id="preset-buttons">
                <button class="vanta-preset-btn" data-preset="oceanic">Oceanic</button>
                <button class="vanta-preset-btn" data-preset="storm">Storm</button>
                <button class="vanta-preset-btn" data-preset="sunrise">Sunrise</button>
                <button class="vanta-preset-btn" data-preset="deep">Deep Sea</button>
                <button class="vanta-preset-btn" data-preset="birds">Birds</button>
                <button class="vanta-preset-btn" data-preset="dots">Dots</button>
                <button class="vanta-preset-btn" data-preset="globe">Globe</button>
                <button class="vanta-preset-btn" data-preset="net">Net</button>
                <button class="vanta-preset-btn" data-preset="rings">Rings</button>
                <button class="vanta-preset-btn" data-preset="fog">Fog</button>
                <button class="vanta-preset-btn" data-preset="clouds">Clouds</button>
                <button class="vanta-preset-btn" data-preset="clouds2">Clouds2</button>
                <button class="vanta-preset-btn" data-preset="halo">Halo</button>
                <button class="vanta-preset-btn" data-preset="cells">Cells</button>
                <button class="vanta-preset-btn" data-preset="topology">Topology</button>
                <button class="vanta-preset-btn" data-preset="trunk">Trunk</button>
            </div>
        </div>
        <div id="time-widget">
            <div class="greeting" id="greeting-text">Hello</div>
            <div class="clock" id="clock-text">--:--:--</div>
            <div class="date" id="date-text">Loading date...</div>
        </div>
        <div id="weather-widget">
            <div class="weather-loading">Fetching weather...</div>
        </div>
        <button id="windy-toggle-btn" onclick="toggleWindy()">🌬️ Show Wind</button>
        <div id="windy-widget">
            <iframe id="windy-iframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Vanta.js Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.birds.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.cells.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.clouds.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.clouds2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.dots.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.globe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.halo.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.rings.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.topology.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.trunk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>

    <script>
        const THEME_KEY = 'homepage_theme';
        const VANTA_PRESET_KEY = 'vanta_preset';
        const VANTA_PRESETS = {
            oceanic: {
                effect: 'WAVES',
                options: {
                    color: 0x23556a,
                    shininess: 32,
                    waveHeight: 18,
                    waveSpeed: 0.8,
                    zoom: 0.92
                }
            },
            storm: {
                effect: 'WAVES',
                options: {
                    color: 0x141d2d,
                    shininess: 78,
                    waveHeight: 30,
                    waveSpeed: 1.25,
                    zoom: 0.95
                }
            },
            sunrise: {
                effect: 'WAVES',
                options: {
                    color: 0xd4793e,
                    shininess: 24,
                    waveHeight: 14,
                    waveSpeed: 0.65,
                    zoom: 0.9
                }
            },
            deep: {
                effect: 'WAVES',
                options: {
                    color: 0x071522,
                    shininess: 64,
                    waveHeight: 24,
                    waveSpeed: 1,
                    zoom: 1.02
                }
            },
            birds: {
                effect: 'BIRDS',
                options: {
                    color1: 0x5ca8d6,
                    color2: 0x0a2f57,
                    birdSize: 1.3,
                    wingSpan: 24,
                    speedLimit: 4,
                    separation: 40,
                    alignment: 28,
                    cohesion: 28
                }
            },
            dots: {
                effect: 'DOTS',
                options: {
                    color: 0x3f8abf,
                    color2: 0xa8d2f2,
                    backgroundColor: 0x0d1c2a,
                    size: 3.2,
                    spacing: 26,
                    showLines: true
                }
            },
            globe: {
                effect: 'GLOBE',
                options: {
                    color: 0x75a6d8,
                    color2: 0x1e4468,
                    backgroundColor: 0x0a1b2b,
                    size: 1,
                    points: 12,
                    maxDistance: 23,
                    spacing: 18
                }
            },
            net: {
                effect: 'NET',
                options: {
                    color: 0x6aa7d8,
                    backgroundColor: 0x081b2c,
                    points: 11,
                    maxDistance: 24,
                    spacing: 18
                }
            },
            rings: {
                effect: 'RINGS',
                options: {
                    color: 0x6a8bc7,
                    backgroundColor: 0x0a1728,
                    maxDistance: 30,
                    spacing: 22
                }
            },
            fog: {
                effect: 'FOG',
                options: {
                    highlightColor: 0x92b3d6,
                    midtoneColor: 0x406684,
                    lowlightColor: 0x122637,
                    baseColor: 0x07121c,
                    blurFactor: 0.5,
                    speed: 1.2,
                    zoom: 0.95
                }
            },
            clouds: {
                effect: 'CLOUDS',
                options: {
                    skyColor: 0x4f84aa,
                    cloudColor: 0xe8f4ff,
                    cloudShadowColor: 0x2a465f,
                    sunColor: 0xf5d08a,
                    sunGlareColor: 0xffe7bc,
                    sunlightColor: 0xfff0cf,
                    speed: 0.7
                }
            },
            clouds2: {
                effect: 'CLOUDS2',
                options: {
                    skyColor: 0x3f6e92,
                    cloudColor: 0xdfeefe,
                    speed: 0.55,
                    texturePath: 'https://cdn.jsdelivr.net/npm/vanta@latest/src/gallery/noise.png'
                }
            },
            halo: {
                effect: 'HALO',
                options: {
                    baseColor: 0x6a94c6,
                    backgroundColor: 0x0a1728,
                    amplitudeFactor: 1.8,
                    size: 1,
                    xOffset: 0.1,
                    yOffset: 0
                }
            },
            cells: {
                effect: 'CELLS',
                options: {
                    color1: 0x6ea4d6,
                    color2: 0x0f2b46,
                    size: 1.3,
                    speed: 1,
                    points: 12
                }
            },
            topology: {
                effect: 'TOPOLOGY',
                options: {
                    color: 0x6b9bcc,
                    backgroundColor: 0x0a1826
                }
            },
            trunk: {
                effect: 'TRUNK',
                options: {
                    color: 0x6ea2d6,
                    backgroundColor: 0x08182a,
                    spacing: 4,
                    chaos: 3
                }
            }
        };

        let vantaEffect = null;
    let presetPanelOpen = false;

        function getInitialPreset() {
            const saved = localStorage.getItem(VANTA_PRESET_KEY);
            return VANTA_PRESETS[saved] ? saved : 'oceanic';
        }

        function updatePresetButtons(activePreset) {
            document.querySelectorAll('.vanta-preset-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.preset === activePreset);
            });
        }

        function togglePresetPanel(forceState) {
            const panel = document.getElementById('vanta-presets');
            const btn = document.getElementById('preset-toggle-btn');
            const shouldOpen = typeof forceState === 'boolean' ? forceState : !presetPanelOpen;
            presetPanelOpen = shouldOpen;
            panel.classList.toggle('expanded', presetPanelOpen);
            btn.textContent = presetPanelOpen ? 'Hide' : 'Show';
        }

        function initVanta(presetName) {
            const preset = VANTA_PRESETS[presetName] || VANTA_PRESETS.oceanic;
            if (vantaEffect && typeof vantaEffect.destroy === 'function') {
                vantaEffect.destroy();
            }

            const effectName = preset.effect || 'WAVES';
            const effectFactory = VANTA[effectName] || VANTA.WAVES;

            vantaEffect = effectFactory({
                el: '#vanta-waves',
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200,
                minWidth: 200,
                scale: 1,
                scaleMobile: 1,
                ...(preset.options || {})
            });

            updatePresetButtons(presetName);
        }

        function setVantaPreset(presetName) {
            if (!VANTA_PRESETS[presetName]) return;
            localStorage.setItem(VANTA_PRESET_KEY, presetName);
            initVanta(presetName);
            togglePresetPanel(false);
        }

        function bindPresetControls() {
            document.querySelectorAll('.vanta-preset-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    setVantaPreset(btn.dataset.preset);
                });
            });
        }

        // Weather Widget
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '⛅',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌦️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️',
        };

        function applyTheme(theme) {
            const isLight = theme === 'light';
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            body.classList.toggle('light-mode', isLight);
            btn.textContent = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
        }

        function getInitialTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'light' || saved === 'dark') return saved;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function toggleTheme() {
            const currentIsLight = document.body.classList.contains('light-mode');
            const nextTheme = currentIsLight ? 'dark' : 'light';
            localStorage.setItem(THEME_KEY, nextTheme);
            applyTheme(nextTheme);
        }

        function updateDateTimeGreeting() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = 'Good evening';

            if (hour >= 5 && hour < 12) greeting = 'Good morning';
            else if (hour >= 12 && hour < 18) greeting = 'Good afternoon';

            const time = now.toLocaleTimeString('sk-SK', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const date = now.toLocaleDateString(undefined, {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            document.getElementById('greeting-text').textContent = greeting;
            document.getElementById('clock-text').textContent = time;
            document.getElementById('date-text').textContent = date;
        }

        async function fetchWeather(lat, lon) {
            const apiKey = '8b71117707867c0cdedcf0b9ba641be0';
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&units=metric&appid=${encodeURIComponent(apiKey)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather fetch failed');
            return res.json();
        }

        function renderWeather(data) {
            const icon = weatherIcons[data.weather[0].icon] || '🌡️';
            const temp = Math.round(data.main.temp);
            const feels = Math.round(data.main.feels_like);
            const desc = data.weather[0].description;
            const location = `${data.name}, ${data.sys.country}`;
            const humidity = data.main.humidity;
            const wind = Math.round(data.wind.speed * 3.6); // m/s to km/h

            document.getElementById('weather-widget').innerHTML = `
                <div class="weather-icon">${icon}</div>
                <div class="weather-info">
                    <div class="weather-temp">${temp}°C</div>
                    <div class="weather-desc">${desc}</div>
                    <div class="weather-location">📍 ${location}</div>
                </div>
                <div class="weather-details">
                    <span>Feels like ${feels}°C</span>
                    <span>💧 ${humidity}%</span>
                    <span>💨 ${wind} km/h</span>
                </div>
            `;
        }

        function setWindyLocation(lat, lon) {
            const zoom = 11;
            const src = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&detailLat=${lat}&detailLon=${lon}&zoom=${zoom}&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1`;
            document.getElementById('windy-iframe').src = src;
        }

        const CACHE_KEY = 'weather_cache';
        const CACHE_TTL = 60 * 60 * 1000; // 1 hour in ms

        function getCachedWeather() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const { data, lat, lon, timestamp } = JSON.parse(raw);
                if (Date.now() - timestamp < CACHE_TTL) return { data, lat, lon };
            } catch {}
            return null;
        }

        function setCachedWeather(data, lat, lon) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ data, lat, lon, timestamp: Date.now() }));
            } catch {}
        }

        function initWeather() {
            // Show cached data immediately if available
            const cached = getCachedWeather();
            if (cached) {
                renderWeather(cached.data);
                setWindyLocation(cached.lat, cached.lon);
            }

            if (!navigator.geolocation) {
                if (!cached) {
                    document.getElementById('weather-widget').innerHTML =
                        '<div class="weather-error">⚠️ Geolocation not supported</div>';
                    setWindyLocation(48.8944, 18.0444); // fallback: Trencin, Slovakia
                }
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    setWindyLocation(lat, lon);
                    // Skip fetch if cache is still fresh
                    if (cached) return;
                    try {
                        const data = await fetchWeather(lat, lon);
                        setCachedWeather(data, lat, lon);
                        renderWeather(data);
                    } catch {
                        if (!cached) {
                            document.getElementById('weather-widget').innerHTML =
                                '<div class="weather-error">⚠️ Could not load weather</div>';
                        }
                    }
                },
                () => {
                    if (!cached) {
                        document.getElementById('weather-widget').innerHTML =
                            '<div class="weather-error">📍 Location access denied</div>';
                        setWindyLocation(48.8944, 18.0444); // fallback: Trencin, Slovakia
                    }
                }
            );
        }

        let windyVisible = false;
        let windySrcReady = false;

        function toggleWindy() {
            const widget = document.getElementById('windy-widget');
            const btn = document.getElementById('windy-toggle-btn');
            windyVisible = !windyVisible;
            widget.style.display = windyVisible ? 'block' : 'none';
            btn.textContent = windyVisible ? '🌬️ Hide Wind' : '🌬️ Show Wind';
        }

        bindPresetControls();
        togglePresetPanel(false);
        initVanta(getInitialPreset());
        applyTheme(getInitialTheme());
        updateDateTimeGreeting();
        setInterval(updateDateTimeGreeting, 1000);
        initWeather();
    </script>
</body>
</html>
