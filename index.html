<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #vanta-waves {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        #widgets-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #weather-widget {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 16px 28px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 260px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            font-size: 15px;
        }

        #weather-widget .weather-icon {
            font-size: 42px;
            line-height: 1;
        }

        #weather-widget .weather-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #weather-widget .weather-temp {
            font-size: 32px;
            font-weight: 600;
            line-height: 1;
        }

        #weather-widget .weather-desc {
            font-size: 13px;
            text-transform: capitalize;
            opacity: 0.9;
        }

        #weather-widget .weather-location {
            font-size: 12px;
            opacity: 0.75;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #weather-widget .weather-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            opacity: 0.85;
            padding-left: 12px;
            border-left: 1px solid rgba(255,255,255,0.3);
        }

        #weather-widget .weather-loading {
            font-size: 14px;
            opacity: 0.85;
        }

        #weather-widget .weather-error {
            font-size: 13px;
            opacity: 0.85;
        }

        #windy-widget {
            width: 650px;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        #windy-widget iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="vanta-waves"></div>

    <!-- Widgets Container -->
    <div id="widgets-container">
        <div id="weather-widget">
            <div class="weather-loading">Fetching weather...</div>
        </div>
        <div id="windy-widget">
            <iframe id="windy-iframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Vanta.js Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>

    <script>
        // WAVES Effect - Full Screen
        VANTA.WAVES({
            el: '#vanta-waves',
            mouseControls: true,
            touchControls: true,
            gyroControls: true,
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00
        });

        // Weather Widget
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '⛅',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌦️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️',
        };

        async function fetchWeather(lat, lon) {
            const apiKey = '8b71117707867c0cdedcf0b9ba641be0';
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&units=metric&appid=${encodeURIComponent(apiKey)}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('Weather fetch failed');
            return res.json();
        }

        function renderWeather(data) {
            const icon = weatherIcons[data.weather[0].icon] || '🌡️';
            const temp = Math.round(data.main.temp);
            const feels = Math.round(data.main.feels_like);
            const desc = data.weather[0].description;
            const location = `${data.name}, ${data.sys.country}`;
            const humidity = data.main.humidity;
            const wind = Math.round(data.wind.speed * 3.6); // m/s to km/h

            document.getElementById('weather-widget').innerHTML = `
                <div class="weather-icon">${icon}</div>
                <div class="weather-info">
                    <div class="weather-temp">${temp}°C</div>
                    <div class="weather-desc">${desc}</div>
                    <div class="weather-location">📍 ${location}</div>
                </div>
                <div class="weather-details">
                    <span>Feels like ${feels}°C</span>
                    <span>💧 ${humidity}%</span>
                    <span>💨 ${wind} km/h</span>
                </div>
            `;
        }

        function setWindyLocation(lat, lon) {
            const zoom = 7;
            const src = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&detailLat=${lat}&detailLon=${lon}&zoom=${zoom}&level=surface&overlay=wind&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1`;
            document.getElementById('windy-iframe').src = src;
        }

        function initWeather() {
            if (!navigator.geolocation) {
                document.getElementById('weather-widget').innerHTML =
                    '<div class="weather-error">⚠️ Geolocation not supported</div>';
                setWindyLocation(48.8944, 18.0444); // fallback: Trencin, Slovakia
                return;
            }
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    setWindyLocation(lat, lon);
                    try {
                        const data = await fetchWeather(lat, lon);
                        renderWeather(data);
                    } catch {
                        document.getElementById('weather-widget').innerHTML =
                            '<div class="weather-error">⚠️ Could not load weather</div>';
                    }
                },
                () => {
                    document.getElementById('weather-widget').innerHTML =
                        '<div class="weather-error">📍 Location access denied</div>';
                    setWindyLocation(48.8944, 18.0444); // fallback: Trencin, Slovakia
                }
            );
        }

        initWeather();
    </script>
</body>
</html>
